name: vx
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_material_design_icons: ^3.0.0+7447
  font_awesome_flutter: ^10.7.0

  # Media
  camera: ^0.11.0+1
  video_player: ^2.11.1

  # Theme & Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

# Flutter Launcher Icons configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/vx_logo.png"
