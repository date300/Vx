name: vx
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_material_design_icons: ^3.0.0+7447
  font_awesome_flutter: ^11.0.0

  # Media
  camera: ^0.11.0+1
  video_player: ^2.11.1
  image_picker: ^1.0.7

  # Theme & Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  url_launcher: ^6.3.1
  ffi: ^2.1.2
  google_mobile_ads: ^5.1.0
  web_socket_channel: ^3.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.2
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

# Flutter Launcher Icons configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/vx_logo.png"
