name: Flutter Build & Deploy

permissions:
  contents: write

on:
  push:
    branches:
      - main

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Java + Gradle cache
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Flutter SDK + Pub cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Smart cleanup
      - name: Smart cleanup
        run: |
          rm -rf build
          rm -rf .dart_tool/flutter_build

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Precache Android artifacts
      - name: Precache Android
        run: flutter precache --android

      # Build universal APK for all phones
      - name: Build APK
        run: |
          flutter build apk \
          --release \
          --tree-shake-icons

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0
          if-no-files-found: error

  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Flutter cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Smart cleanup
      - name: Smart cleanup
        run: |
          rm -rf build
          rm -rf .dart_tool/flutter_build

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Precache Web artifacts
      - name: Precache Web
        run: flutter precache --web

      # Disable old service worker cache issue
      - name: Remove old service worker
        run: |
          rm -f web/flutter_service_worker.js

      # Build Web
      - name: Build Web
        run: |
          flutter build web \
          --release \
          --wasm \
          --pwa-strategy=none \
          --tree-shake-icons \
          --base-href=/mine_matrix/

      # Deploy GitHub Pages
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

      # Upload Web artifact
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: build/web
          compression-level: 0
