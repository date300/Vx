name: Flutter Build & Deploy

permissions:
  contents: write

on:
  push:
    branches:
      - main

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Java + Gradle cache
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Flutter SDK + Pub cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Smart clean (full clean না করে fast build)
      - name: Smart cleanup
        run: |
          rm -rf build
          rm -rf .dart_tool/flutter_build

      # Dependency install
      - name: Install dependencies
        run: flutter pub get

      # Precache only android artifacts
      - name: Precache Android
        run: flutter precache --android

      # Build optimized APK
      - name: Build APK
        run: |
          flutter build apk \
          --release \
          --split-per-abi \
          --tree-shake-icons

      # Upload artifact faster
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
          compression-level: 0
          if-no-files-found: error

  build-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Flutter cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Smart cleanup
      - name: Smart cleanup
        run: |
          rm -rf build
          rm -rf .dart_tool/flutter_build

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # Precache only web artifacts
      - name: Precache Web
        run: flutter precache --web

      # Faster web build
      - name: Build Web
        run: |
          flutter build web \
          --release \
          --wasm \
          --tree-shake-icons \
          --base-href=/mine_matrix/

      # Deploy GitHub Pages
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

      # Upload web artifact
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: build/web
          compression-level: 0
